<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자 분석 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab { background: #1e293b; color: #94a3b8; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
  .tab.active { background: #3b82f6; color: #fff; }
  .tab:hover:not(.active) { background: #334155; }
  .section { display: none; }
  .section.active { display: block; }
  .notice { background: #1e293b; border-left: 4px solid #3b82f6; padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px; }
  .card.full { grid-column: 1 / -1; }
  h2 { color: #f1f5f9; margin-bottom: 16px; font-size: 1.2em; }
  .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  input, select, button { padding: 10px 16px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 14px; }
  input:focus, select:focus { outline: 2px solid #3b82f6; }
  button { background: #3b82f6; border: none; cursor: pointer; font-weight: 600; }
  button:hover { background: #2563eb; }
  button.danger { background: #ef4444; }
  button.danger:hover { background: #dc2626; }
  button.secondary { background: #475569; }
  button.secondary:hover { background: #334155; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
  th { color: #94a3b8; font-size: 0.85em; text-transform: uppercase; }
  tr:hover { background: #0f172a; }
  .positive { color: #10b981; }
  .negative { color: #ef4444; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75em; margin-left: 8px; }
  .tag-buy { background: #064e3b; color: #10b981; }
  .tag-sell { background: #7f1d1d; color: #ef4444; }
  .tag-hold { background: #78350f; color: #f59e0b; }
  .krx-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .krx-chip { background: #334155; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85em; transition: background 0.2s; }
  .krx-chip:hover { background: #475569; }
  .krx-chip.in-watchlist { background: #3b82f6; }
  .coin-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .coin-chip { background: #0f2137; padding: 8px 12px; border-radius: 999px; cursor: pointer; font-size: 14px; border: 1px solid #1f3350; }
  .coin-chip.active { background: #2260c4; border-color: #2260c4; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .meta-item { background: #0f2137; padding: 10px 12px; border-radius: 10px; }
  .meta-label { color: #8aa3bf; font-size: 0.8em; margin-bottom: 4px; }
  .meta-value { font-size: 1.1em; font-weight: 600; }
  .empty { text-align: center; padding: 40px; color: #64748b; }
  .error { background: #7f1d1d; color: #fecaca; padding: 12px; border-radius: 8px; margin-top: 12px; }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
    .meta-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showTab('stock')">📈 주식 (KRX)</button>
    <button class="tab" onclick="showTab('coin')">🪙 코인</button>
  </div>

  <!-- 주식 탭 -->
  <div id="stock-section" class="section active">
    <h1 style="margin-bottom: 10px;">📈 한국 주식 분석</h1>
    <div class="subtitle" style="color:#64748b; margin-bottom:20px;">Naver Finance 기반 | API 키 불필요</div>

    <div class="card">
      <h2>⭐ 관심 종목</h2>
      <div class="input-row">
        <input type="text" id="watchlistTicker" placeholder="종목 코드 (예: 005930)">
        <button onclick="addWatchlist()">추가</button>
        <button class="secondary" onclick="saveCurrentAsWatchlist()">현재 차트 저장</button>
      </div>
      <div class="krx-list" id="quickAdd"></div>
      <div id="watchlistTable"></div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2>📈 가격 차트 + 지표</h2>
      <div class="input-row">
        <input type="text" id="chartTicker" placeholder="종목 코드" value="005930">
        <select id="chartRange">
          <option value="90">3개월</option>
          <option value="180">6개월</option>
          <option value="365" selected>1년</option>
        </select>
        <button onclick="loadChart()">조회</button>
      </div>
      <canvas id="priceChart" style="margin-top:16px;"></canvas>
      <div id="signalBox" style="margin-top:20px; font-size: 0.95em; color: #94a3b8; line-height: 1.8;"></div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2>📊 다중 차트 비교 (정규화)</h2>
      <div class="input-row">
        <input type="text" id="compare1" placeholder="종목1" value="005930">
        <input type="text" id="compare2" placeholder="종목2" value="000660">
        <input type="text" id="compare3" placeholder="종목3" value="005380">
        <button onclick="loadCompare()">비교</button>
      </div>
      <canvas id="compareChart" style="margin-top:16px; max-height:300px;"></canvas>
    </div>

    <div class="card" style="margin-top:20px;">
      <h2>📋 전체 지표 요약</h2>
      <table>
        <thead>
          <tr>
            <th>종목</th><th>현재가</th><th>변동률</th><th>SMA20</th><th>SMA60</th><th>RSI</th><th>신호</th><th>거래량</th>
          </tr>
        </thead>
        <tbody id="summaryBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 코인 탭 -->
  <div id="coin-section" class="section">
    <h1 style="margin-bottom:6px;">🪙 Coin Dashboard</h1>
    <div class="subtitle" style="color:#64748b; margin-bottom:20px;">Binance USDT 기준 | API 키 불필요</div>

    <div class="card">
      <h2>빠른 선택</h2>
      <div class="coin-list" id="coinList"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>가격 + 이동평균</h2>
        <canvas id="coinPriceChart"></canvas>
      </div>
      <div class="card">
        <h2>거래량</h2>
        <canvas id="coinVolChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>정보</h2>
      <div id="coinMeta" class="meta-grid"></div>
    </div>
  </div>

  <div style="margin-top:40px; text-align:center; color:#475569; font-size:0.8em;">
    데이터 출처: 주식(Naver Finance) · 코인(Binance) | GitHub Actions 자동 업데이트
  </div>
</div>

<script>
const STORAGE_KEY = 'krx_stock_v4';
let config = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let watchlist = config.watchlist || ['005930', '000660', '005380', '035720', '012330', '051910', '068270', '206640'];
let stockData = null;
let cryptoData = null;
let priceChart = null, compareChart = null, coinPriceChart = null, coinVolChart = null;

const QUICK_TICKERS = [
  { code: '005930', name: '삼성전자' },
  { code: '000660', name: 'SK하이닉스' },
  { code: '005380', name: '현대차' },
  { code: '035420', name: '네이버' },
  { code: '035720', name: '카카오' },
  { code: '012330', name: '현대모비스' },
  { code: '051910', name: 'LG화학' },
  { code: '068270', name: '셀트리온' },
  { code: '206640', name: '바디텍메드' }
];

const COIN_NAMES = {
  btc:'BTC', eth:'ETH', bnb:'BNB', sol:'SOL', xrp:'XRP',
  ada:'ADA', avax:'AVAX', dot:'DOT', link:'LINK', matic:'MATIC'
};

function showTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  if (name === 'stock') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('stock-section').classList.add('active');
    if (!stockData) loadStockData();
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('coin-section').classList.add('active');
    if (!cryptoData) loadCryptoData();
    setTimeout(() => window.dispatchEvent(new Event('resize')), 50);
  }
}

function fmt(n) { return Number(n).toLocaleString(); }
function toKRW(n) { return '₩' + fmt(Math.round(n)); }
function fmtUSD(n, d=2) { return Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }); }

// ===== STOCK =====
async function loadStockData() {
  try {
    const res = await fetch('stock_data.json');
    if (!res.ok) throw new Error('stock_data.json을 불러올 수 없습니다.');
    stockData = await res.json();
  } catch (e) {
    stockData = { updated_at: '로컬 데이터 없음', tickers: {} };
  }
  renderQuickAdd();
  renderWatchlist();
  renderSummary();
  loadChart();
  loadCompare();
}

function renderQuickAdd() {
  const wrap = document.getElementById('quickAdd');
  wrap.innerHTML = QUICK_TICKERS.map(t => {
    const inList = watchlist.includes(t.code);
    return `<span class="krx-chip ${inList ? 'in-watchlist' : ''}" data-code="${t.code}">${t.name} ${t.code}</span>`;
  }).join('');
  wrap.querySelectorAll('.krx-chip').forEach(el => {
    el.onclick = () => {
      const code = el.dataset.code;
      watchlist = watchlist.includes(code) ? watchlist.filter(w => w !== code) : [...watchlist, code];
      saveConfig(); renderQuickAdd(); renderWatchlist(); renderSummary();
    };
  });
}

function addWatchlist() {
  const input = document.getElementById('watchlistTicker');
  const code = input.value.trim().replace('.KS','').replace('.KQ','');
  if (!code || watchlist.includes(code)) return;
  watchlist.push(code); input.value = ''; saveConfig(); renderQuickAdd(); renderWatchlist(); renderSummary();
}

function saveCurrentAsWatchlist() {
  const code = document.getElementById('chartTicker').value.trim().replace('.KS','').replace('.KQ','');
  if (code && !watchlist.includes(code)) { watchlist.push(code); saveConfig(); renderQuickAdd(); renderWatchlist(); renderSummary(); }
}

function saveConfig() { config.watchlist = watchlist; localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); }

function renderWatchlist() {
  const wrap = document.getElementById('watchlistTable');
  if (!watchlist.length) { wrap.innerHTML = '<p class="empty">관심 종목을 추가해주세요.</p>'; return; }
  const tmap = {};
  QUICK_TICKERS.forEach(t => tmap[t.code] = t.name);
  const rows = watchlist.map(code => {
    const arr = stockData?.tickers?.[code];
    if (!arr?.length) return `<tr><td><strong>${code}</strong> ${tmap[code] ? `<span style="color:#94a3b8;font-size:0.9em">(${tmap[code]})</span>` : ''} <button class="danger" style="margin-left:4px;padding:2px 6px;font-size:0.75em" onclick="removeWatchlist('${code}')">삭제</button></td><td colspan="5">데이터 없음</td></tr>`;
    const q = arr[arr.length - 1];
    const prev = arr[arr.length - 2];
    const chg = ((q.close - prev.close) / prev.close) * 100;
    const cls = chg >= 0 ? 'positive' : 'negative';
    const nameStr = tmap[code] ? `<span style="color:#94a3b8;font-size:0.85em;margin-left:4px;">${tmap[code]}</span>` : '';
    return `<tr>
      <td><strong>${code}</strong>${nameStr} <button class="danger" style="margin-left:4px;padding:2px 6px;font-size:0.75em" onclick="removeWatchlist('${code}')">삭제</button></td>
      <td>${toKRW(q.close)}</td>
      <td class="${cls}">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</td>
      <td>${toKRW(Math.max(...arr.slice(-30).map(d => d.high)))}</td>
      <td>${toKRW(Math.min(...arr.slice(-30).map(d => d.low)))}</td>
      <td>${fmt(q.volume)}</td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table><thead><tr><th>종목</th><th>현재가</th><th>변동률</th><th>기간 고</th><th>기간 저</th><th>거래량</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function removeWatchlist(code) { watchlist = watchlist.filter(w => w !== code); saveConfig(); renderQuickAdd(); renderWatchlist(); renderSummary(); }

async function loadCompare() {
  const codes = [document.getElementById('compare1').value.trim(), document.getElementById('compare2').value.trim(), document.getElementById('compare3').value.trim()].map(s => s.replace('.KS','').replace('.KQ','')).filter(Boolean);
  if (codes.length < 2) { alert('2개 이상 입력'); return; }
  const ctx = document.getElementById('compareChart').getContext('2d');
  if (compareChart) compareChart.destroy();
  const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];
  const datasets = [];
  codes.forEach((code, i) => {
    const arr = stockData?.tickers?.[code];
    if (!arr?.length) return;
    const base = arr[0].close;
    datasets.push({
      label: code,
      data: arr.map(r => ({ x: r.date, y: (r.close / base) * 100 })),
      borderColor: colors[i % colors.length], borderWidth: 2, tension: 0.1, pointRadius: 0, fill: false
    });
  });
  if (!datasets.length) { document.getElementById('compareChart').parentElement.innerHTML = '<p class="error">비교할 데이터가 없습니다.</p>'; return; }
  compareChart = new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#e2e8f0' } }, title: { display: true, text: '정규화 가격 비교 (시작=100)', color: '#f1f5f9' } },
      scales: {
        x: { type: 'time', time: { unit: 'month' }, ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
        y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
      }
    }
  });
}

async function loadChart() {
  const code = document.getElementById('chartTicker').value.trim().replace('.KS','').replace('.KQ','');
  const range = parseInt(document.getElementById('chartRange').value, 10);
  if (!code) return;
  const arr = stockData?.tickers?.[code]?.slice(-range);
  if (!arr?.length) { document.getElementById('signalBox').innerHTML = '<div class="error">데이터가 없습니다.</div>'; return; }
  const closes = arr.map(r => r.close);
  const dates = arr.map(r => r.date);
  const sma20 = calcSMA(closes, 20);
  const sma60 = calcSMA(closes, 60);
  const rsi = calcRSI(closes, 14);
  const lastRSI = rsi[rsi.length - 1];
  const lastSMA20 = sma20.filter(v => v !== null).pop();
  const lastSMA60 = sma60.filter(v => v !== null).pop();
  let signal = 'HOLD', emoji = '➖', reasons = [];
  if (lastRSI < 30) { signal = 'BUY'; emoji = '🟢'; reasons.push('RSI 과매도'); }
  else if (lastRSI > 70) { signal = 'SELL'; emoji = '🔴'; reasons.push('RSI 과매수'); }
  if (lastSMA20 && lastSMA60) {
    if (lastSMA20 > lastSMA60) { if (signal === 'HOLD') { signal = 'BUY'; emoji = '🟢'; } reasons.push('골든크로스'); }
    else if (lastSMA20 < lastSMA60) { if (signal === 'HOLD') { signal = 'SELL'; emoji = '🔴'; } reasons.push('데드크로스'); }
  }
  document.getElementById('signalBox').innerHTML = `
    <span class="tag tag-${signal.toLowerCase()}">${emoji} ${signal}</span>
    <span style="margin-left:8px;">RSI: <strong>${lastRSI.toFixed(1)}</strong></span>
    <span style="margin-left:8px; color:#64748b;">| ${reasons.join(', ') || '신호 없음'}</span>
    <span style="float:right; color:#64748b;">현재가: <strong>${toKRW(closes[closes.length-1])}</strong></span>
  `;
  const ctx = document.getElementById('priceChart').getContext('2d');
  if (priceChart) priceChart.destroy();
  priceChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [
        { label: code, data: closes, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', borderWidth: 2, fill: true },
        { label: 'SMA20', data: sma20, borderColor: '#f59e0b', borderWidth: 2, borderDash: [5,5], fill: false },
        { label: 'SMA60', data: sma60, borderColor: '#ef4444', borderWidth: 2, borderDash: [10,5], fill: false },
        { label: 'RSI', data: rsi, borderColor: '#a855f7', borderWidth: 1.5, yAxisID: 'y1', pointRadius: 0 }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#e2e8f0' } } },
      scales: {
        x: { ticks: { color: '#94a3b8', maxTicksLimit: 6 }, grid: { color: '#334155' } },
        y: { ticks: { color: '#94a3b8', callback: v => '₩' + Math.round(v).toLocaleString() }, grid: { color: '#334155' } },
        y1: { position: 'right', min: 0, max: 100, ticks: { color: '#a855f7' }, grid: { drawOnChartArea: false } }
      }
    }
  });
}

function renderSummary() {
  const tbody = document.getElementById('summaryBody');
  if (!stockData || !watchlist.length) { tbody.innerHTML = ''; return; }
  tbody.innerHTML = watchlist.map(code => {
    const arr = stockData.tickers?.[code];
    const tmap = {};
    QUICK_TICKERS.forEach(t => tmap[t.code] = t.name);
    if (!arr?.length) return `<tr><td><strong>${code}</strong> ${tmap[code] ? `<span style="color:#94a3b8">(${tmap[code]})</span>` : ''}</td><td colspan="7">데이터 부족</td></tr>`;
    const closes = arr.map(r => r.close);
    const sma20 = calcSMA(closes, 20).filter(v => v !== null).pop();
    const sma60 = calcSMA(closes, 60).filter(v => v !== null).pop();
    const rsi = calcRSI(closes, 14).filter(v => v !== null).pop();
    const cur = closes[closes.length - 1];
    const prev = closes[closes.length - 2];
    const chg = ((cur - prev) / prev) * 100;
    let sig = 'HOLD';
    if (rsi < 30) sig = 'BUY';
    else if (rsi > 70) sig = 'SELL';
    if (sma20 && sma60) { if (sma20 > sma60 && sig === 'HOLD') sig = 'BUY'; else if (sma20 < sma60 && sig === 'HOLD') sig = 'SELL'; }
    const nameStr = tmap[code] ? `<span style="color:#94a3b8;font-size:0.85em">${tmap[code]}</span>` : '';
    return `<tr>
      <td><strong>${code}</strong>${nameStr}</td>
      <td>${toKRW(cur)}</td>
      <td class="${chg >= 0 ? 'positive' : 'negative'}">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</td>
      <td>${sma20 ? toKRW(sma20) : '-'}</td>
      <td>${sma60 ? toKRW(sma60) : '-'}</td>
      <td>${rsi.toFixed(1)}</td>
      <td><span class="tag tag-${sig.toLowerCase()}">${sig}</span></td>
      <td>${fmt(arr[arr.length-1].volume)}</td>
    </tr>`;
  }).join('');
}

// ===== COIN =====
async function loadCryptoData() {
  try {
    const res = await fetch('crypto_data.json');
    if (!res.ok) throw new Error('crypto_data.json을 불러올 수 없습니다.');
    cryptoData = await res.json();
    renderCoinList();
    renderCoinChart();
  } catch (e) {
    document.getElementById('coinMeta').innerHTML = `<div class="error">${e.message}</div>`;
  }
}

function renderCoinList() {
  const wrap = document.getElementById('coinList');
  wrap.innerHTML = Object.keys(COIN_NAMES).map(k => {
    const active = k === stateCoin.symbol ? 'active' : '';
    const exists = cryptoData?.coins?.[k] ? '' : ' style="opacity:0.5"';
    return `<span class="coin-chip ${active}"${exists} data-key="${k}">${COIN_NAMES[k]}</span>`;
  }).join('');
  wrap.querySelectorAll('.coin-chip').forEach(el => {
    el.onclick = () => {
      if (!cryptoData?.coins?.[el.dataset.key]) return;
      stateCoin.symbol = el.dataset.key;
      renderCoinList(); renderCoinChart();
    };
  });
}

const stateCoin = { symbol: 'btc' };

function renderCoinChart() {
  const coin = cryptoData?.coins?.[stateCoin.symbol];
  if (!coin?.prices?.length) return;
  const labels = coin.prices.map(p => new Date(p[0]));
  const values = coin.prices.map(p => p[1]);
  const vols = (coin.volumes || []).map(v => v[1]);
  const sma = calcSMA(values, 20);
  if (coinPriceChart) coinPriceChart.destroy();
  if (coinVolChart) coinVolChart.destroy();

  coinPriceChart = new Chart(document.getElementById('coinPriceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [

  const items = [

  document.getElementById('coinMeta').innerHTML = items.map(([k,v]) => {
    const cls = typeof v === 'string' && v.includes('%') ? (v.startsWith('-') ? '' : '') : '';
    return `<div class="meta-item"><div class="meta-label">${k}</div><div class="meta-value">${v}</div></div>`;
  }).join('');
}

// 공통 지표
function calcSMA(data, period) {
  const out = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { out.push(null); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i - j];
    out.push(sum / period);
  }
  return out;
}

function calcRSI(data, period = 14) {
  const changes = [];
  for (let i = 1; i < data.length; i++) changes.push(data[i] - data[i-1]);
  const gains = changes.map(c => c > 0 ? c : 0);
  const losses = changes.map(c => c < 0 ? -c : 0);
  let avgG = gains.slice(0, period).reduce((a,b) => a+b, 0) / period;
  let avgL = losses.slice(0, period).reduce((a,b) => a+b, 0) / period;
  const rsi = [null, ...Array(period).fill(50)];
  for (let i = period; i < data.length; i++) {
    avgG = (avgG * (period - 1) + gains[i-1]) / period;
    avgL = (avgL * (period - 1) + losses[i-1]) / period;
    const rs = avgL === 0 ? 100 : avgG / avgL;
    rsi.push(100 - 100 / (1 + rs));
  }
  return rsi;
}
