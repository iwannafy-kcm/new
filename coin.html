<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Dash - CoinGecko</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b1220; color: #e6eef8; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
  nav { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
  nav a { color: #f3f7fb; text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 8px; background:#12243a; }
  nav a.secondary { color:#b8c6db; background: transparent; }
  .card { background: #12243a; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  input, button { padding: 10px 12px; border-radius: 10px; border: 1px solid #1f3350; background:#0b1220; color:#e6eef8; }
  button { background:#2260c4; border: none; font-weight: 700; cursor: pointer; }
  ul { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  li { background:#0f2137; padding: 8px 12px; border-radius: 999px; cursor: pointer; font-size: 14px; }
  li.active { background:#2260c4; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { padding: 10px; text-align: left; border-bottom: 1px solid #1f3350; }
  .plus { color: #10b981; } .minus { color: #ef4444; }
  .hint { color:#8aa3bf; font-size: 13px; }
  canvas { max-height: 320px; }
  @media (max-width: 760px) { .row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <a href="index.html">📈 주식</a>
    <a href="coin.html" class="secondary">🪙 코인</a>
    <span style="margin-left:auto; color:#6b82a6; font-size:13px;">CoinGecko 기반</span>
  </nav>

  <h1 style="margin-bottom:6px;">🪙 Coin Dashboard</h1>
  <p class="hint" id="lastUpdate">데이터 불러오는 중...</p>

  <div class="card">
    <h2 style="margin-bottom:10px;">빠른 선택</h2>
    <ul id="coinList"></ul>
  </div>

  <div class="row">
    <div class="card">
      <h2>가격 + 이동평균</h2>
      <canvas id="priceChart"></canvas>
    </div>
    <div class="card">
      <h2>거래량</h2>
      <canvas id="volChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h2>정보</h2>
    <div id="meta" class="hint">종목을 선택하세요.</div>
  </div>
</div>

<script>
const COIN_MAP = {
  btc: 'bitcoin',
  eth: 'ethereum',
  bnb: 'binancecoin',
  sol: 'solana',
  xrp: 'ripple',
  ada: 'cardano',
  avax: 'avalanche-2',
  dot: 'polkadot',
  link: 'chainlink',
  matic: 'matic-network'
};
const COIN_NAMES = {
  btc:'BTC', eth:'ETH', bnb:'BNB', sol:'SOL', xrp:'XRP', ada:'ADA', avax:'AVAX', dot:'DOT', link:'LINK', matic:'MATIC'
};

let state = { coinId: 'bitcoin', days: 365, chart: null, volChart: null };

function $(sel) { return document.querySelector(sel); }
function fmt(n, d=2) { return n.toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }); }

async function load(id) {
  state.coinId = id || state.coinId;
  const days = state.days;
  const url = `https://api.coingecko.com/api/v3/coins/${state.coinId}/market_chart?vs_currency=usd&days=${days}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('API 요청 실패');
    const json = await res.json();
    $('lastUpdate').textContent = '업데이트: ' + new Date().toLocaleString('ko-KR');
    renderCharts(json);
    renderMeta(state.coinId);
  } catch (e) {
    $('lastUpdate').textContent = '❌ ' + e.message;
  }
}

function renderCharts({ prices, total_volumes }) {
  const labels = prices.map(p => new Date(p[0]));
  const values = prices.map(p => p[1]);
  const vols = total_volumes.map(v => v[1]);

  const sma20 = calcSMA(values, 20);

  if (state.chart) state.chart.destroy();
  if (state.volChart) state.volChart.destroy();

  state.chart = new Chart($('priceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Price', data: values, borderColor: '#7aa7ff', backgroundColor: 'rgba(122,167,255,0.08)', borderWidth: 2, fill: true, pointRadius: 0 },
        { label: 'SMA20', data: sma20, borderColor: '#f5a623', borderWidth: 2, borderDash: [5,5], fill: false, pointRadius: 0 }
      ]
    },
    options: chartOpts('USD')
  });

  state.volChart = new Chart($('volChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Volume', data: vols, backgroundColor: 'rgba(122,167,255,0.35)', borderColor: '#7aa7ff', borderWidth: 1 }] },
    options: chartOpts('')
  });
}

function chartOpts(unit) {
  return {
    responsive: true,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { labels: { color: '#cdd8e4' } } },
    scales: {
      x: { ticks: { color: '#8aa3bf', maxTicksLimit: 8 }, grid: { color: '#142540' } },
      y: { ticks: { color: '#8aa3bf', callback: v => unit === 'USD' ? '$' + fmt(v) : '' }, grid: { color: '#142540' } }
    }
  };
}

async function renderMeta(id) {
  try {
    const res = await fetch(`https://api.coingecko.com/api/v3/coins/${id}?localization=false&tickers=false&community_data=false&developer_data=false`);
    const info = await res.json();
    const m = info.market_data || {};
    $('meta').innerHTML = `
      <strong>${info.name} (${info.symbol?.toUpperCase()})</strong><br><br>
      현재가: ${fmt(m.current_price?.usd, m.current_price?.usd < 1 ? 6 : 2)} USD<br>
      24h: <span class="${m.price_change_percentage_24h >= 0 ? 'plus' : 'minus'}">${fmt(m.price_change_percentage_24h)}%</span><br>
      7일: <span class="${m.price_change_percentage_7d >= 0 ? 'plus' : 'minus'}">${fmt(m.price_change_percentage_7d)}%</span><br>
      시총: ${fmt(m.market_cap?.usd, 0)} USD<br>
      순환: ${fmt(m.circulating_supply, 0)}<br>
      최대: ${fmt(m.total_supply || m.max_supply || 0, 0)}
    `;
  } catch (e) {
    $('meta').textContent = '메타 정보를 불러올 수 없습니다.';
  }
}

function calcSMA(data, period) {
  const out = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { out.push(null); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i - j];
    out.push(sum / period);
  }
  return out;
}

function renderList() {
  const wrap = $('coinList');
  wrap.innerHTML = Object.keys(COIN_NAMES).map(k => {
    const active = COIN_MAP[k] === state.coinId ? 'active' : '';
    return `<li class="${active}" data-id="${COIN_MAP[k]}" data-key="${k}">${COIN_NAMES[k]}</li>`;
  }).join('');

  wrap.querySelectorAll('li').forEach(el => {
    el.onclick = () => {
      state.coinId = el.dataset.id;
      renderList();
      load();
    };
  });
}

renderList();
load();
</script>
</body>
</html>
