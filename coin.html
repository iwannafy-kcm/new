<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Dash</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b1220; color: #e6eef8; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
  nav { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
  nav a { color: #f3f7fb; text-decoration: none; font-weight: 600; padding: 8px 12px; border-radius: 8px; background:#12243a; }
  nav a.secondary { color:#b8c6db; background: transparent; }
  .card { background: #12243a; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  button { padding: 10px 12px; border-radius: 10px; border: 1px solid #1f3350; background:#0b1220; color:#e6eef8; cursor: pointer; }
  button { background:#2260c4; border: none; font-weight: 700; }
  ul { list-style: none; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  li { background:#0f2137; padding: 8px 12px; border-radius: 999px; cursor: pointer; font-size: 14px; }
  li.active { background:#2260c4; }
  .plus { color: #10b981; } .minus { color: #ef4444; }
  .hint { color:#8aa3bf; font-size: 13px; }
  canvas { max-height: 320px; }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meta-item { background:#0f2137; padding: 10px 12px; border-radius: 10px; }
  @media (max-width: 760px) { .row { grid-template-columns: 1fr; } .meta-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <nav>
    <a href="index.html">📈 주식</a>
    <a href="coin.html">🪙 코인</a>
    <span style="margin-left:auto; color:#6b82a6; font-size:13px;">CoinGecko</span>
  </nav>

  <h1 style="margin-bottom:6px;">🪙 Coin Dashboard</h1>
  <p class="hint" id="lastUpdate">데이터 불러오는 중...</p>

  <div class="card">
    <h2 style="margin-bottom:10px;">빠른 선택</h2>
    <ul id="coinList"></ul>
  </div>

  <div class="row">
    <div class="card">
      <h2>가격 + 이동평균</h2>
      <canvas id="priceChart"></canvas>
    </div>
    <div class="card">
      <h2>거래량</h2>
      <canvas id="volChart"></canvas>
    </div>
  </div>

  <div class="card">
    <h2>정보</h2>
    <div id="meta" class="hint">로딩 중...</div>
  </div>
</div>

<script>
const COIN_MAP = {
  btc: 'bitcoin',
  eth: 'ethereum',
  bnb: 'binancecoin',
  sol: 'solana',
  xrp: 'ripple',
  ada: 'cardano',
  avax: 'avalanche-2',
  dot: 'polkadot',
  link: 'chainlink',
  matic: 'matic-network'
};
const COIN_NAMES = {
  btc:'BTC', eth:'ETH', bnb:'BNB', sol:'SOL', xrp:'XRP', ada:'ADA', avax:'AVAX', dot:'DOT', link:'LINK', matic:'MATIC'
};

let state = { symbol: 'btc', chart: null, volChart: null, data: null };
function $(sel) { return document.querySelector(sel); }
function fmt(n, d=2) { return Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d }); }

async function load(symbol) {
  state.symbol = symbol || state.symbol;
  try {
    const res = await fetch('crypto_data.json');
    if (!res.ok) throw new Error('crypto_data.json을 불러올 수 없습니다.');
    state.data = await res.json();
    $('lastUpdate').textContent = '업데이트: ' + (state.data.updated_at || '-');
    renderList();
    renderChart();
    renderMeta();
  } catch (e) {
    $('lastUpdate').textContent = '❌ ' + e.message;
    $('meta').textContent = '데이터가 없습니다.';
  }
}

function renderList() {
  const wrap = $('coinList');
  const coins = state.data?.coins || {};
  wrap.innerHTML = Object.keys(COIN_NAMES).map(k => {
    const active = k === state.symbol ? 'active' : '';
    const exists = coins[k] ? '' : ' style="opacity:0.5"';
    return `<li class="${active}"${exists} data-key="${k}">${COIN_NAMES[k]}</li>`;
  }).join('');
  wrap.querySelectorAll('li').forEach(el => {
    el.onclick = () => {
      const key = el.dataset.key;
      if (!state.data?.coins?.[key]) return;
      state.symbol = key;
      renderList();
      renderChart();
      renderMeta();
    };
  });
}

function renderChart() {
  const coin = state.data?.coins?.[state.symbol];
  if (!coin || !coin.prices?.length) {
    $('priceChart').parentElement.innerHTML = '<p class="hint">데이터가 부족합니다.</p>';
    $('volChart').parentElement.innerHTML = '<p class="hint">데이터가 부족합니다.</p>';
    return;
  }

  const labels = coin.prices.map(p => new Date(p[0]));
  const values = coin.prices.map(p => p[1]);
  const vols = (coin.volumes || []).map(v => v[1]);

  const sma = calcSMA(values, 20);

  if (state.chart) state.chart.destroy();
  if (state.volChart) state.volChart.destroy();

  state.chart = new Chart($('priceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Price', data: values, borderColor: '#7aa7ff', backgroundColor: 'rgba(122,167,255,0.08)', borderWidth: 2, fill: true, pointRadius: 0 },
        { label: 'SMA20', data: sma, borderColor: '#f5a623', borderWidth: 2, borderDash: [5,5], fill: false, pointRadius: 0 }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#cdd8e4' } } },
      scales: {
        x: { ticks: { color: '#8aa3bf', maxTicksLimit: 8 }, grid: { color: '#142540' } },
        y: { ticks: { color: '#8aa3bf', callback: v => '$' + fmt(v) }, grid: { color: '#142540' } }
      }
    }
  });

  state.volChart = new Chart($('volChart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Volume', data: vols, backgroundColor: 'rgba(122,167,255,0.35)', borderColor: '#7aa7ff', borderWidth: 1 }] },
    options: {
      responsive: true,
      plugins: { legend: { labels: { color: '#cdd8e4' } } },
      scales: {
        x: { ticks: { color: '#8aa3bf', maxTicksLimit: 8 }, grid: { color: '#142540' } },
        y: { ticks: { color: '#8aa3bf' }, grid: { color: '#142540' } }
      }
    }
  });
}

function renderMeta() {
  const coin = state.data?.coins?.[state.symbol];
  if (!coin) { $('meta').textContent = '종목을 선택하세요.'; return; }
  const wrap = $('meta');
  const items = [
    ['이름', `${coin.name} (${(coin.symbol || '').toUpperCase()})`],
    ['현재가', fmt(coin.current_price, coin.current_price < 1 ? 6 : 2) + ' USD'],
    ['24h', `${fmt(coin.change_24h)}%`],
    ['7일', `${fmt(coin.change_7d)}%`],
    ['시총', fmt(coin.market_cap, 0) + ' USD'],
    ['순환', fmt(coin.circulating_supply, 0)],
    ['최대', fmt(coin.max_supply || coin.total_supply || 0, 0)]
  ];
  wrap.innerHTML = '<div class="meta-grid">' + items.map(([k,v]) => {
    const cls = typeof v === 'string' && v.includes('%') && !v.startsWith('-') ? 'plus' : (typeof v === 'string' && v.startsWith('-') ? 'minus' : '');
    return `<div class="meta-item"><div class="hint">${k}</div><div class="${cls}">${v}</div></div>`;
  }).join('') + '</div>';
}

function calcSMA(data, period) {
  const out = [];
  for (let i = 0; i < data.length; i++) {
    if (i < period - 1) { out.push(null); continue; }
    let sum = 0;
    for (let j = 0; j < period; j++) sum += data[i - j];
    out.push(sum / period);
  }
  return out;
}

load('btc');
</script>
</body>
</html>
